<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVTech · Ticket</title>
    <link rel="icon" href="./assets/img/logos/favicon-512.png" type="image/png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="marca">
            <a href="index.html">
                <img class="logo-claro" src="./assets/img/logos/lvtech-wordmark-light.png" alt="LVTech">
                <img class="logo-oscuro" src="./assets/img/logos/lvtech-wordmark-dark.png" alt="LVTech">
            </a>
            <div>
                <p class="alumnos">Francisco &amp; Valentino</p>
            </div>
        </div>

        <nav class="nav-principal">
            <a href="index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="carrito.html">Carrito <span id="contador-carrito" class="badge">0</span></a>
            <label class="toggle-tema" for="boton-tema">
                <input type="checkbox" id="boton-tema">
                <span class="toggle-track" id="toggle-track"></span>
                <span class="toggle-thumb" id="toggle-thumb">🌙</span>
            </label>
        </nav>    
    </header>

    <main class="ticket">
        <div id="contenedor-ticket" class="tarjeta-ticket"></div>
        <button type="button" id="boton-reiniciar" class="boton-secundario">Volver al inicio</button>
        <button type="button" id="boton-pdf" class="boton-primario">Descargar ticket PDF</button>
    </main>

    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script type="module" src="js/contador-carrito.js"></script>
    <script type="module" src="js/ticket.js"></script>
    <script type="module" src="js/tema.js"></script>
</body>
</html>
