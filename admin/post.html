<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVTech · Admin · Crear</title>
    <link rel="icon" href="../assets/img/logos/favicon-512.png" type="image/png">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="marca">
            <a href="../index.html">
                <img class="logo-claro" src="../assets/img/logos/lvtech-wordmark-light.png" alt="LVTech">
                <img class="logo-oscuro" src="../assets/img/logos/lvtech-wordmark-dark.png" alt="LVTech">
            </a>
            <div>
                <h1 class="nombre-app">LVTech · Admin</h1>
                <p class="alumnos">Francisco &amp; Valentino</p>
            </div>
        </div>

        <nav class="nav-principal">
            <a href="index.html">VER</a>
            <a href="get.html">CONSULTAR</a>
            <a href="post.html" class="activo">CREAR</a>
            <a href="put.html">MODIFICAR</a>
            <a href="delete.html">DESACTIVAR</a>
        </nav>

        <button id="boton-tema" class="boton-tema" type="button" aria-label="Cambiar tema">🌙</button>  
    </header>

    <main class="productos">
        <h2>Crear producto</h2>

        <form id="postProduct-form" class="form-admin">
            <label for="nameProd">Nombre</label>
            <input type="text" name="name" id="nameProd" required>

            <label for="descriptionProd">Descripción</label>
            <input type="text" name="description" id="descriptionProd">

            <label for="imageProd">Imagen (URL)</label>
            <input type="text" name="image" id="imageProd" required>

            <label for="categoryProd">Categoría</label>
            <select name="category" id="categoryProd" required>
                <option value="">Seleccioná una categoría</option>
                <option value="hardware">Hardware</option>
                <option value="software">Software</option>
            </select>

            <label for="priceProd">Precio</label>
            <input type="number" name="price" id="priceProd" required step="0.01">

            <button type="submit" class="boton-primario">Crear producto</button>
        </form>

        <div id="contenedor-mensaje" style="margin-top: 24px;"></div>
    </main>

    <script type="module" src="js/post.js"></script>
    <script type="module" src="../js/tema.js"></script>
</body>
</html>
