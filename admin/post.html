<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVTech · Admin · Crear</title>
    <link rel="icon" href="../assets/img/logos/favicon-512.png" type="image/png">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="marca">
            <a href="index.html">
                <img class="logo" src="../assets/img/logos/lvtech-wordmark-light.png" alt="LVTech">
            </a>
            <div>
                <h1 class="nombre-app">LVTech · Admin</h1>
                <p class="alumnos">Francisco &amp; Valentino</p>
            </div>
        </div>

        <nav class="nav-principal">
            <a href="index.html">VER</a>
            <a href="get.html">CONSULTAR</a>
            <a href="post.html" class="activo">CREAR</a>
            <a href="put.html">MODIFICAR</a>
            <a href="delete.html">DESACTIVAR</a>
        </nav>
    </header>

    <main class="productos">
        <h2>Crear producto</h2>

        <form id="postProduct-form" class="form-admin">
            <label for="nameProd">Nombre</label>
            <input type="text" name="name" id="nameProd" required>

            <label for="descriptionProd">Descripción</label>
            <input type="text" name="description" id="descriptionProd">

            <label for="imageProd">Imagen (URL)</label>
            <input type="text" name="image" id="imageProd" required>

            <label for="categoryProd">Categoría</label>
            <select name="category" id="categoryProd" required>
                <option value="">Seleccioná una categoría</option>
                <option value="hardware">Hardware</option>
                <option value="software">Software</option>
            </select>

            <label for="priceProd">Precio</label>
            <input type="number" name="price" id="priceProd" required>

            <button type="submit" class="boton-primario">Crear producto</button>
        </form>

        <div id="contenedor-mensaje" style="margin-top: 24px;"></div>
    </main>

    <script>
        const postProductForm = document.getElementById("postProduct-form");
        const contenedorMensaje = document.getElementById("contenedor-mensaje");
        const urlBase = "http://localhost:3000/api/productos";

        function validarFormulario(data) {
            const errores = [];

            if (!data.name || data.name.trim().length < 2) {
                errores.push("El nombre debe tener al menos 2 caracteres");
            }

            if (!data.image || data.image.trim().length === 0) {
                errores.push("La imagen es obligatoria");
            }

            if (!data.category) {
                errores.push("Debe seleccionar una categoría");
            }

            if (!data.price || isNaN(data.price) || Number(data.price) <= 0) {
                errores.push("El precio debe ser un número mayor a 0");
            }

            return errores;
        }

        function mostrarMensaje(tipo, mensaje) {
            contenedorMensaje.innerHTML = `
                <p class="mensaje mensaje-${tipo}">${mensaje}</p>
            `;
        }

        postProductForm.addEventListener("submit", async event => {
            event.preventDefault();

            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            // Convertimos price a numero antes de enviarlo
            data.price = Number(data.price);

            const errores = validarFormulario(data);
            if (errores.length > 0) {
                mostrarMensaje("error", errores.join(" / "));
                return;
            }

            try {
                const response = await fetch(urlBase, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    mostrarMensaje("error", result.message || "No se pudo crear el producto");
                    return;
                }

                mostrarMensaje("exito", result.message);
                postProductForm.reset();

            } catch (error) {
                console.error("Error al crear el producto: ", error);
                mostrarMensaje("error", "Ocurrió un error al crear el producto");
            }
        });
    </script>
</body>
</html>
