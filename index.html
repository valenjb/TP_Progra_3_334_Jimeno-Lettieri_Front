<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVTech · Bienvenida</title>
    <link rel="icon" href="./assets/img/logos/favicon-512.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="marca">
            <a href="index.html">
                <img class="logo" src="./assets/img/logos/lvtech-wordmark-light.png" alt="LVTech">
            </a>
            <div>
                <p class="alumnos">Francisco &amp; Valentino</p>
            </div>
        </div>

        <nav class="nav-principal">
            <a href="index.html" class="activo">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="carrito.html">Carrito <span id="contador-carrito" class="badge">0</span></a>
        </nav>

    </header>

    <main class="bienvenida">
        <section class="tarjeta-bienvenida">
            <h2>¡Bienvenido a LVTech!</h2>
            <p>Tu autoservicio de hardware y licencias de software. Decinos tu nombre para empezar a armar tu compra.</p>

            <form id="form-bienvenida">
                <label for="nombreCliente">¿Cómo te llamás?</label>
                <input type="text" id="nombreCliente" name="nombreCliente" required minlength="2" placeholder="Ej: Martina" autocomplete="off">
                <button type="submit">Continuar</button>
            </form>
        </section>
    </main>

    <script type="module" src="js/bienvenida.js"></script>
    <script type="module" src="js/contador-carrito.js"></script>

</body>
</html>
