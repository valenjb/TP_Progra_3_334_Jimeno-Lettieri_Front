<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVTech · Productos</title>
    <link rel="icon" href="./assets/img/logos/favicon-512.png" type="image/png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="marca">
            <a href="index.html">
                <img class="logo" src="./assets/img/logos/lvtech-wordmark-light.png" alt="LVTech">
            </a>
            <div>
                <p class="alumnos">Francisco &amp; Valentino</p>
            </div>
        </div>

        <nav class="nav-principal">
            <a href="index.html">Inicio</a>
            <a href="productos.html" class="activo">Productos</a>
            <a href="carrito.html">Carrito <span id="contador-carrito" class="badge">0</span></a>
        </nav>
    </header>

    <main class="productos">
        <p id="saludo-cliente" class="saludo"></p>

        <div class="filtros">
            <div class="tabs-categoria" id="tabs-categoria">
                <button type="button" class="tab activo" data-categoria="">Todos</button>
                <button type="button" class="tab" data-categoria="hardware">Hardware</button>
                <button type="button" class="tab" data-categoria="software">Software</button>
            </div>
        </div>

        <div id="contenedor-productos" class="grilla-productos">
            <p class="mensaje-vacio">Cargando productos...</p>
        </div>

        <div id="paginacion" class="paginacion"></div>
    </main>


    <script type="module" src="js/productos.js"></script>
    <script type="module" src="js/contador-carrito.js"></script>
    <script type="module" src="js/validar-cliente.js"></script>
</body>
</html>
